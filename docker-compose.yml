services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-240595528763.dkr.ecr.eu-west-1.amazonaws.com/syam-venturuzzo/backend:latest}
    container_name: proxmox-dashboard-backend
    restart: unless-stopped
    environment:
      - PORT=8000
      - DB_HOST=syam-projectwork-pontos.c9nj1x2p6gk5.eu-west-1.rds.amazonaws.com
      - DB_PORT=5432
      - DB_NAME=postgres
      - DB_USER=pontos
      - DB_PASSWORD=Vmware1!
      - DB_SSLMODE=require
      - DB_SSLROOTCERT=
      - PROXMOX_VERIFY_SSL=false
    networks:
      - dashboard-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${FRONTEND_IMAGE:-240595528763.dkr.ecr.eu-west-1.amazonaws.com/syam-venturuzzo/frontend:latest}
    container_name: proxmox-dashboard-frontend
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - backend
    networks:
      - dashboard-network

networks:
  dashboard-network:
    driver: bridge