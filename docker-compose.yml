services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-240595528763.dkr.ecr.eu-west-1.amazonaws.com/syam-venturuzzo/backend:latest}
    container_name: proxmox-dashboard-backend
    restart: unless-stopped
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_REGION=${AWS_REGION:-eu-west-1}
      - AWS_SECRETS_SECRET_NAME=${AWS_SECRETS_SECRET_NAME:-syam-projectwork-pontos}
      - PORT=8000
      - DEBUG=${DEBUG:-false}
      - METRICS_POLL_INTERVAL=${METRICS_POLL_INTERVAL:-30}
      - LOGS_POLL_INTERVAL=${LOGS_POLL_INTERVAL:-10}
      - SERVICES_POLL_INTERVAL=${SERVICES_POLL_INTERVAL:-60}
      - PROXMOX_VERIFY_SSL=${PROXMOX_VERIFY_SSL:-false}
    networks:
      - dashboard-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${FRONTEND_IMAGE:-240595528763.dkr.ecr.eu-west-1.amazonaws.com/syam-venturuzzo/frontend:latest}
    container_name: proxmox-dashboard-frontend
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - backend
    networks:
      - dashboard-network

networks:
  dashboard-network:
    driver: bridge