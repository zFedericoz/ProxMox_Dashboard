services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-240595528763.dkr.ecr.eu-west-1.amazonaws.com/syam-venturuzzo/backend:latest}
    container_name: proxmox-dashboard-backend
    restart: unless-stopped
    environment:
      - PORT=8000
      - DB_HOST=${DB_HOST:?DB_HOST is required (set it in .env)}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-postgres}
      - DB_USER=${DB_USER:?DB_USER is required (set it in .env)}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required (set it in .env)}
      - DB_SSLMODE=${DB_SSLMODE:-require}
      - DB_SSLROOTCERT=${DB_SSLROOTCERT:-}
      - PROXMOX_USER=${PROXMOX_USER:-root@pam}
      - PROXMOX_PASSWORD=${PROXMOX_PASSWORD:-}
      - PROXMOX_TOKEN_NAME=${PROXMOX_TOKEN_NAME:-}
      - PROXMOX_TOKEN_VALUE=${PROXMOX_TOKEN_VALUE:-}
      - PROXMOX_VERIFY_SSL=${PROXMOX_VERIFY_SSL:-false}
    networks:
      - dashboard-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${FRONTEND_IMAGE:-240595528763.dkr.ecr.eu-west-1.amazonaws.com/syam-venturuzzo/frontend:latest}
    container_name: proxmox-dashboard-frontend
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - backend
    networks:
      - dashboard-network

networks:
  dashboard-network:
    driver: bridge