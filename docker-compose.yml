services:
  db:
    image: postgres:16-alpine
    container_name: proxmox-dashboard-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=proxmox_dashboard
      - POSTGRES_USER=proxmox
      - POSTGRES_PASSWORD=proxmox123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dashboard-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxmox -d proxmox_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8.12
    container_name: proxmox-dashboard-pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@pgadmin.org
      - PGADMIN_DEFAULT_PASSWORD=admin123
      - PGADMIN_PORT=5050
      - PGADMIN_LISTEN_ADDRESS=0.0.0.0
      - CHECK_EMAIL_DELIVERABILITY=false
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - dashboard-network
    ports:
      - "5050:5050"
    depends_on:
      - db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proxmox-dashboard-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=8000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=proxmox_dashboard
      - DB_USER=proxmox
      - DB_PASSWORD=proxmox123
      - PROXMOX_VERIFY_SSL=false
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dashboard-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proxmox-dashboard-frontend
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - backend
    networks:
      - dashboard-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  dashboard-network:
    driver: bridge